[default.extend-words]
# `conly_flags` in lre-cc
conly = "conly"

[default]
extend-ignore-re = [
  # Old wrong spelling support
  "alias = \"Cachable\"",
  "old_unique_qualifier_cachable_works",
  # Argument in .github/workflows/image.yaml
  "sme=off",
]

[files]
extend-exclude = [
  # Covered by Vale
  "*.md",
  ".git/*",
  ".github/styles/*",
  "kubernetes/vendor/olm/*",
  "nativelink-proto/*",
  "web/*",
  # Contains old wrongly spelt data
  "nativelink-util/tests/data/*.json",
]
ignore-hidden = false
