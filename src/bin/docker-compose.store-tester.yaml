services:
  redis:
    image: redis:8.4-alpine3.22
    ports:
      - 6379:6379
    command: redis-server --loglevel debug --enable-debug-command yes

  redis-replica-1:
    image: redis:8.4-alpine3.22
    depends_on:
      - redis
    command: redis-server --replicaof redis 6379 --enable-debug-command yes

  # Based on https://gregornovak.eu/setting-up-redis-sentinel-with-docker-compose
  # To demo sentinel failover, run `redis-cli -p 6379 DEBUG sleep 30`
  sentinel:
    image: redis:8.4-alpine3.22
    depends_on:
      - redis
      - redis-replica-1
    ports:
      - 26379:26379
    # Sentinel configuration is created dynamically and mounted by volume because Sentinel itself will modify the configuration
    # once it is running. If master changes this will be reflected in all configurations and some additional things are added which are
    # meant only for runtime use and not something that should be committed as base configuration.
    command: >
      sh -c 'echo "sentinel resolve-hostnames yes" > /etc/sentinel.conf &&
            echo "sentinel monitor master redis 6379 1" >> /etc/sentinel.conf &&
            echo "sentinel down-after-milliseconds master 1000" >> /etc/sentinel.conf &&
            echo "sentinel failover-timeout master 5000" >> /etc/sentinel.conf &&
            echo "sentinel parallel-syncs master 1" >> /etc/sentinel.conf &&
            redis-server /etc/sentinel.conf --sentinel'

  cluster-node-1:
    image: redis:8.4-alpine3.22
    ports:
      - 7000:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-node-2:
    image: redis:8.4-alpine3.22
    ports:
      - 7001:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-node-3:
    image: redis:8.4-alpine3.22
    ports:
      - 7002:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-node-4:
    image: redis:8.4-alpine3.22
    ports:
      - 7003:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-node-5:
    image: redis:8.4-alpine3.22
    ports:
      - 7004:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-node-6:
    image: redis:8.4-alpine3.22
    ports:
      - 7005:7000
    volumes:
      - ./cluster.conf:/etc/cluster.conf
    command: >
        redis-server /etc/cluster.conf
    healthcheck:
      interval: 2s
      retries: '3'
      test: ["CMD", "redis-cli", "-p", "7000", "-c", "ping"]
      timeout: 5s

  cluster-creator:
    command:
      - redis-cli
      - --cluster
      - create
      - cluster-node-1:7000
      - cluster-node-2:7000
      - cluster-node-3:7000
      - cluster-node-4:7000
      - cluster-node-5:7000
      - cluster-node-6:7000
      - --cluster-yes
      - --cluster-replicas
      - '1'
    depends_on:
      cluster-node-1:
        condition: service_healthy
      cluster-node-2:
        condition: service_healthy
      cluster-node-3:
        condition: service_healthy
      cluster-node-4:
        condition: service_healthy
      cluster-node-5:
        condition: service_healthy
      cluster-node-6:
        condition: service_healthy
    image: redis:8.4-alpine3.22
