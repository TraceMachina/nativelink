---
name: Nix

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  nix-bazel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
    name: Bazel Dev / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Invoke Bazel build in Nix shell
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            nix develop --fallback --impure --command \
            bash -c "bazel test ... --verbose_failures --lockfile_mode=error"
          elif [ "$RUNNER_OS" == "macOS" ]; then
            nix develop --fallback --impure --command \
            bash -c "bazel test //... --verbose_failures --lockfile_mode=error"
          else
            echo "Unsupported runner OS: $RUNNER_OS"
            exit 1
          fi
        shell: bash

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()

  nix-cargo:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
    name: Cargo Dev / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Invoke Cargo build in Nix shell
        run: >
          nix develop --fallback --impure --command
          bash -c "cargo test --all --profile=smol"

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()

  installation:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
    name: Installation / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Test nix run
        run: |
          nix run -L .#nativelink-is-executable-test

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()
        with:
          nix_name: .#nativelink-is-executable-test

  integration:
    name: ${{ matrix.test-name }}
    strategy:
      matrix:
          test-name: [buildstream, buck2, rbe-toolchain, mongo]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Test ${{ matrix.test-name }} run
        run: |
          nix run -L .#${{ matrix.test-name }}-with-nativelink-test

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()
        with:
          nix_name: .#${{ matrix.test-name }}-with-nativelink-test
