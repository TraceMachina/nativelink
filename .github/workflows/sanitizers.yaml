---
name: Sanitizers

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sanitized-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        sanitizer: [asan]
    name: ${{ matrix.sanitizer }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Free disk space
        uses: ./.github/actions/free-disk

      - name: Setup Bazel
        uses: >- # v0.19.0
          bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86
        with:
          bazelisk-cache: true
          repository-cache: true

      - name: Setup NativeLink Cloud
        uses: ./.github/actions/setup-nativelink-cloud
        with:
          ci-mode: ${{ vars.NATIVELINK_CI_MODE }}
          api-key: >-
            ${{ github.event_name == 'push'
                && secrets.NATIVELINK_PROD_API_KEY_RW
                || secrets.NATIVELINK_PROD_API_KEY_RO }}
          mode: ${{ github.event_name == 'push' && 'write' || 'read' }}

      - name: Run Bazel tests
        run: bazel test --config=${{ matrix.sanitizer }} --lockfile_mode=error --verbose_failures //...
