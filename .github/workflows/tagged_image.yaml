---
name: Create SemVer-tagged OCI image
on:
  push:
    tags:
      - '*'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  get-images-matrix:
    runs-on: ubuntu-24.04
    outputs:
       matrix: ${{ steps.setmatrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set Images matrix
        id: setmatrix
        run: |
          MATRIX_STRINGIFIED=$(jq -c . < .github/images-matrix.json)
          echo "::set-output name=matrix::$MATRIX_STRINGIFIED"

  publish-image:
    needs: get-images-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-images-matrix.outputs.matrix) }}
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Upload image
        uses: ./.github/actions/test-and-upload-image
        with:
          testing: false
          image: ${{ matrix.image }}
          multi-arch: ${{ matrix.multi-arch }}
          components: ${{ matrix.components }}
          tag: ${{github.ref_name}}
          GHCR_USERNAME: ${{ vars.GHCR_PUBLISH_USER }}
          GHCR_PASSWORD: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}
          nix_name: .#${{ matrix.image }}
