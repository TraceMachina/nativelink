---
name: Bazel Native

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/styles/**'
      - 'web/**'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep the existing required check names on the project-pinned Bazel.
          - os: ubuntu-24.04
            bazel_version: 9.1.1
            check_name: ubuntu-24.04
          - os: macos-26
            bazel_version: 9.1.1
            check_name: macos-26
          # Deterministic Bazel compatibility lane. Randomizing Bazel versions
          # makes failures harder to reproduce. Bazel 8 cannot read the
          # Bazel 9 lockfile format, so this lane tests source compatibility
          # without enforcing the committed MODULE.bazel.lock.
          - os: ubuntu-24.04
            bazel_version: 8.7.0
            check_name: ubuntu-24.04 / Bazel 8.7.0
    name: ${{ matrix.check_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel_version }}
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Free disk space
        uses: ./.github/actions/free-disk

      - name: Setup Bazel
        uses: >- # v0.19.0
          bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-bazel-${{ matrix.bazel_version }}

      - name: Show Bazel version
        run: bazel --version

      - name: Run Bazel tests
        run: |
          if [ "$RUNNER_OS" == "Linux" ] || [ "$RUNNER_OS" == "macOS" ]; then
            if [ "${{ matrix.bazel_version }}" == "8.7.0" ]; then
              # Bazel 8 cannot parse the Bazel 9 MODULE.bazel.lock format.
              bazel test //... \
                --lockfile_mode=off \
                --extra_toolchains=@rust_toolchains//:all \
                --verbose_failures
            else
              bazel test //... \
                --lockfile_mode=error \
                --extra_toolchains=@rust_toolchains//:all \
                --verbose_failures
            fi
          elif [ "$RUNNER_OS" == "Windows" ]; then
            bazel \
              --lockfile_mode=error \
              --output_user_root=${{ steps.bazel-cache.outputs.mountpoint }} \
              test \
              --config=windows \
              //... \
              --verbose_failures
          else
            echo "Unknown runner OS: $RUNNER_OS"
            exit 1
          fi

  redis-store-tester:
    name: Redis store tester
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Free disk space
        uses: ./.github/actions/free-disk

      - uses: hoverkraft-tech/compose-action@11beaa1c2dae4e8ed7b1665aa074723b6cecb0e4 # v3.0.0
        with:
          compose-file: src/bin/docker-compose.store-tester.yaml

      - name: Setup Bazel
        uses: >- # v0.19.0
          bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86
        with:
          bazelisk-cache: true
          repository-cache: true
          disk-cache: ${{ github.workflow }}-ubuntu-24.04

      - name: Run Store tester with sentinel
        run: |
          bazel run //:redis_store_tester \
            --lockfile_mode=error \
            --extra_toolchains=@rust_toolchains//:all \
            --verbose_failures -- --redis-mode sentinel --mode sequential
        env:
          RUST_LOG: trace
          REDIS_HOST: localhost
          MAX_LOOPS: 10 # running sequentially just to test all the actions work

      - name: Run Store tester with standard
        run: |
          bazel run //:redis_store_tester \
            --lockfile_mode=error \
            --extra_toolchains=@rust_toolchains//:all \
            --verbose_failures -- --redis-mode standard --mode sequential
        env:
          RUST_LOG: trace
          REDIS_HOST: localhost
          MAX_LOOPS: 10 # running sequentially just to test all the actions work

      - name: Run Store tester with cluster
        run: |
          bazel run //:redis_store_tester \
            --lockfile_mode=error \
            --extra_toolchains=@rust_toolchains//:all \
            --verbose_failures -- --redis-mode cluster --mode sequential
        env:
          RUST_LOG: trace
          REDIS_HOST: localhost
          MAX_LOOPS: 10 # running sequentially just to test all the actions work
