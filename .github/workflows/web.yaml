---
name: Web
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yaml'

permissions: read-all

# Production deployment is handled by Vercel's Git integration (see
# web/DEPLOYMENT.md). This workflow only verifies that both apps in the
# web/ monorepo install, typecheck, lint, and build cleanly.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
    name: Web build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: >- # v6.0.2
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare Worker
        uses: ./.github/actions/prepare-nix
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}

      - name: Install, typecheck, lint, build
        working-directory: web
        run: |
          nix develop --fallback --impure --command bash -c "
            bun install --frozen-lockfile && \
            bun run typecheck && \
            bun run check && \
            bun run build
          "

      - name: Teardown Worker
        uses: ./.github/actions/end-nix
        if: always()
        with:
          nativelink_attic_token: ${{ secrets.NATIVELINK_ATTIC_TOKEN }}
