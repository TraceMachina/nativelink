name: Bug Report
description: File a bug report to help us improve NativeLink
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Need help right away?
        Join our [Slack community](https://forms.gle/LtaWSixEC6bYi5xF7) for faster responses.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of NativeLink are you running?
      placeholder: "e.g. v1.0.0, main@abc1234, or ghcr.io image tag"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Client
      description: Which client are you using with NativeLink?
      options:
        - Bazel
        - Buck2
        - Other
    validations:
      required: true

  - type: input
    id: os_arch
    attributes:
      label: OS / Architecture
      description: What operating system and architecture?
      placeholder: "e.g. Linux x86_64, macOS arm64"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      description: How are you deploying NativeLink?
      options:
        - Docker
        - Nix
        - Kubernetes
        - Bare metal
        - Other
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage backend
      description: Which storage backend are you using for the CAS?
      options:
        - S3
        - GCS
        - Azure Blob
        - Local filesystem
        - Redis
        - Other
    validations:
      required: true

  - type: input
    id: workers
    attributes:
      label: Number of workers
      description: How many workers are in your deployment? (if applicable)
      placeholder: "e.g. 10"

  - type: input
    id: cas_size
    attributes:
      label: Rough size of CAS
      description: Approximately how large is your CAS store?
      placeholder: "e.g. ~50GiB on local SSD"

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Please paste a sanitized version of your NativeLink configuration.
      render: json5
      placeholder: "{\n  ...\n}"

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Please paste any relevant logs, error messages, or stack traces.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else you think would be useful (links, references, screenshots, etc.).
