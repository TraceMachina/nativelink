name: Feature Request
description: Suggest an idea or improvement for NativeLink
title: "[Feature]: "
labels: ["type:enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Need to discuss it first?
        Join our [Slack community](https://forms.gle/LtaWSixEC6bYi5xF7) for faster feedback.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What use case does this unlock?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: "A new configuration option that..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative solutions have you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any links, references, screenshots, or prior art that informed this request.
