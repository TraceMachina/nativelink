#:schema ../tools/cargo-with-detailed-deps.json
lints.workspace = true

[package]
edition = "2024"
name = "nativelink-redis-tester"
version = "1.1.0"

[dependencies]
nativelink-util = { path = "../nativelink-util" }

either = { version = "1.15.0", default-features = false }
redis = { version = "1.0.0", default-features = false }
redis-protocol = { version = "6.0.0", default-features = false, features = [
  "bytes",
  "resp2",
  "resp3",
  "std",
] }
redis-test = { version = "1.0.0", default-features = false, features = ["aio"] }
tokio = { version = "1.52.2", features = [], default-features = false }
tracing = { version = "0.1.41", default-features = false }
